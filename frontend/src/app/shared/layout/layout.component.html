<mat-sidenav-container class="sidenav-container">
  
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon color="primary" class="logo">local_shipping</mat-icon>
      <h2>RouteBoard</h2>
    </div>
    
    <mat-nav-list>
      <a mat-list-item *ngFor="let item of menuItems" 
         [routerLink]="item.path" 
         routerLinkActive="active-link" 
         [routerLinkActiveOptions]="{exact: true}">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <div matListItemTitle>{{ item.label }}</div>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="header-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>
      
      <span class="spacer"></span>
      
      <div class="user-info" *ngIf="authService.currentUser() as user">
        <span class="user-name">{{ user.name }}</span>
        <span class="user-role badge">{{ user.role }}</span>
      </div>

      <button mat-icon-button (click)="logout()" title="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
    
  </mat-sidenav-content>
</mat-sidenav-container>
