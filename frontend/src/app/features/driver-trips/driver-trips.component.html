<div class="trips-container">
  <div class="header-row">
    <h1>My Assigned Trips</h1>
  </div>

  <div class="mat-elevation-z2 table-container">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="vehicleNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Vehicle No. </th>
        <td mat-cell *matCellDef="let trip"> {{trip.vehicleNumber}} </td>
      </ng-container>

      <ng-container matColumnDef="origin">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Origin </th>
        <td mat-cell *matCellDef="let trip"> {{trip.origin}} </td>
      </ng-container>

      <ng-container matColumnDef="destination">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Destination </th>
        <td mat-cell *matCellDef="let trip"> {{trip.destination}} </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
        <td mat-cell *matCellDef="let trip"> 
          <span class="status-badge" [ngClass]="trip.status.toLowerCase()">{{trip.status}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Assigned Date </th>
        <td mat-cell *matCellDef="let trip"> {{trip.createdAt | date:'short'}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let trip">
          <button mat-flat-button color="primary" class="action-btn" (click)="openUpdateStatusDialog(trip)">
            Update Status
          </button>
          <button mat-icon-button color="accent" (click)="viewHistory(trip)" title="View History">
            <mat-icon>history</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-state" colspan="6">
          You have no assigned trips.
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" aria-label="Select page of your trips"></mat-paginator>
  </div>
</div>
