<h2 mat-dialog-title>Update Trip Status</h2>

<mat-dialog-content>
  <form [formGroup]="statusForm" class="dialog-form">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="SCHEDULED">Scheduled</mat-option>
        <mat-option value="IN_PROGRESS">In Progress</mat-option>
        <mat-option value="COMPLETED">Completed</mat-option>
        <mat-option value="CANCELLED">Cancelled</mat-option>
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="isSaving">Cancel</button>
  <button mat-flat-button color="primary" (click)="onSave()" [disabled]="statusForm.invalid || isSaving">
    {{ isSaving ? 'Saving...' : 'Update' }}
  </button>
</mat-dialog-actions>
